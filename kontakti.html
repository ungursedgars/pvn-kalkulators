<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/logo-192.png">
<title>Kontakti | PVN Kalkulators</title>
<meta name="description" content="Sazinies ar pvnkalkulators.eu — jautājumi, idejas un sadarbības piedāvājumi. Atbildēsim tuvāko dienu laikā.">
<meta name="robots" content="index, follow">
<meta name="color-scheme" content="light dark">
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1c2430;
    --muted: #5b6675;
    --accent: #1f6feb;
    --accent-soft: rgba(31, 111, 235, .08);
    --border: #dfe3e8;
    --result-bg: #f0f5ff;
    --shadow: 0 2px 12px rgba(20, 30, 50, .08);
    --ok: #2e9e5b; --ok-soft: rgba(46,158,91,.1);
    --err: #d0433f; --err-soft: rgba(208,67,63,.1);
  }
  [data-theme="dark"] {
    --bg: #12161c;
    --card: #1b212a;
    --text: #e8ecf1;
    --muted: #9aa5b1;
    --accent: #4d8dff;
    --accent-soft: rgba(77, 141, 255, .12);
    --border: #2c3440;
    --result-bg: #202a3a;
    --shadow: 0 2px 12px rgba(0, 0, 0, .4);
    --ok: #4ec27e; --ok-soft: rgba(78,194,126,.14);
    --err: #ff6b68; --err-soft: rgba(255,107,104,.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-y: scroll; scrollbar-gutter: stable; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.65;
    transition: background .2s, color .2s;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
  .logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  nav { display: flex; align-items: center; gap: 14px; }
  nav a { color: var(--muted); text-decoration: none; font-size: .95rem; white-space: nowrap; }
  nav a:hover { color: var(--accent); }
  .lang-dropdown { position: relative; }
  #langBtn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    height: 30px; padding: 0 10px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; gap: 6px;
    font-size: .8rem; font-weight: 700;
  }
  #langBtn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-list {
    display: none; position: absolute; top: calc(100% + 6px); right: 0; z-index: 20;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow); padding: 6px; min-width: 130px;
  }
  .lang-dropdown.open .lang-list { display: block; }
  .lang-list button {
    display: block; width: 100%; padding: 9px 12px; border: none; border-radius: 8px;
    background: none; color: var(--text); cursor: pointer; text-align: left;
    font-size: .95rem; white-space: nowrap;
  }
  .lang-list button:hover { background: var(--accent-soft); color: var(--accent); }
  .lang-list button.active { background: var(--accent); color: #fff; }
  #sepBtn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 30px; height: 30px; cursor: pointer; font-size: 1.1rem; font-weight: 700;
    color: var(--text); display: flex; align-items: center; justify-content: center;
  }
  #sepBtn:hover { border-color: var(--accent); color: var(--accent); }
  #themeBtn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 30px; height: 30px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  #themeBtn:hover { border-color: var(--accent); }

  .menu-dropdown { position: relative; }
  #menuBtn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 30px; height: 30px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  #menuBtn:hover { border-color: var(--accent); color: var(--accent); }
  .menu-list {
    display: none; position: absolute; top: calc(100% + 6px); right: 0; z-index: 20;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow); padding: 6px; min-width: 150px;
  }
  .menu-dropdown.open .menu-list { display: block; }
  .menu-list a {
    display: block; padding: 9px 12px; border-radius: 8px;
    color: var(--text); text-decoration: none; font-size: .95rem; white-space: nowrap;
  }
  .menu-list a:hover { background: var(--accent-soft); color: var(--accent); }

  @media (max-width: 560px) {
    .header-inner { padding: 9px 16px; }
    nav { gap: 8px; }
    .logo { font-size: 1.05rem; }
    #sepBtn, #themeBtn, #menuBtn { width: 28px; height: 28px; }
    #sepBtn { font-size: 1rem; }
    #langBtn { height: 28px; padding: 0 8px; }
  }

  main { padding: 40px 0 60px; }
  .contact-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow); padding: 34px 28px;
  }
  .contact-card h1 { font-size: 1.6rem; margin-bottom: 8px; text-align: center; }
  .contact-card .lead { color: var(--muted); font-size: 1.05rem; margin-bottom: 26px; text-align: center; }

  form { display: flex; flex-direction: column; gap: 14px; }
  .field-label { font-weight: 600; font-size: .9rem; margin-bottom: 5px; display: block; }
  .field-label .req { color: var(--accent); }
  input, textarea {
    width: 100%; font-family: inherit; font-size: 1rem; padding: 11px 13px;
    border: 2px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--text); resize: vertical;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); background: var(--accent-soft); }
  textarea { min-height: 130px; }
  .honey { position: absolute; left: -9999px; top: -9999px; }

  .submit-btn {
    margin-top: 4px; padding: 13px 20px; font-size: 1.05rem; font-weight: 600; cursor: pointer;
    border: none; border-radius: 11px; background: var(--accent); color: #fff;
    box-shadow: 0 4px 14px rgba(31,111,235,.25);
  }
  .submit-btn:hover { filter: brightness(1.05); }
  .submit-btn:disabled { opacity: .6; cursor: default; filter: none; }

  .form-msg { display: none; padding: 12px 14px; border-radius: 10px; font-size: .95rem; }
  .form-msg.show { display: block; }
  .form-msg.ok { background: var(--ok-soft); color: var(--ok); border: 1px solid var(--ok); }
  .form-msg.err { background: var(--err-soft); color: var(--err); border: 1px solid var(--err); }

  .alt-mail { margin-top: 18px; text-align: center; font-size: .9rem; color: var(--muted); }
  .alt-mail a { color: var(--accent); }
  .back-link { display: block; margin-top: 20px; text-align: center; color: var(--accent); text-decoration: none; font-size: .95rem; }
  .back-link:hover { text-decoration: underline; }

  footer { border-top: 1px solid var(--border); padding: 22px 0 34px; color: var(--muted); font-size: .88rem; text-align: center; }
  footer a { color: var(--muted); }
  footer a:hover { color: var(--accent); }
  .footer-links { margin-bottom: 8px; }
  .footer-links a { margin: 0 4px; }
</style>
</head>
<body>

<header>
  <div class="wrap header-inner">
    <a class="logo" href="/">PVN<span>kalkulators</span></a>
    <nav>
      <div class="lang-dropdown" id="langDropdown">
        <button type="button" id="langBtn" title="Mainīt valodu" aria-haspopup="true" aria-expanded="false" aria-controls="langSwitch">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
          <span id="langCurrent">LV</span>
        </button>
        <div class="lang-list" id="langSwitch" role="menu">
          <button type="button" data-lang="lv" role="menuitemradio" aria-checked="true">Latviešu</button>
          <button type="button" data-lang="ru" role="menuitemradio" aria-checked="false">Русский</button>
          <button type="button" data-lang="en" role="menuitemradio" aria-checked="false">English</button>
        </div>
      </div>
      <button id="sepBtn" title="Mainīt decimāldaļu atdalītāju">,</button>
      <button id="themeBtn" title="Mainīt gaišo/tumšo režīmu"></button>
      <div class="menu-dropdown" id="menuDropdown">
        <button type="button" id="menuBtn" title="Izvēlne" aria-haspopup="true" aria-expanded="false" aria-controls="menuList">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="menu-list" id="menuList" role="menu">
          <a href="instrukcijas" id="navInstrukcijas" role="menuitem">Instrukcijas</a>
          <a href="buj" id="navBuj" role="menuitem">BUJ</a>
          <a href="likmes" id="navLikmes" role="menuitem">Likmes</a>
          <a href="kontakti" id="navKontakti" role="menuitem">Kontakti</a>
        </div>
      </div>
    </nav>
  </div>
</header>

<main class="wrap">
  <div class="contact-card">
    <h1 id="contactTitle">Sazinies ar mums</h1>
    <p class="lead" id="contactText">Jautājums, ideja vai sadarbības piedāvājums? Uzraksti — atbildēsim tuvāko dienu laikā.</p>

    <form id="contactForm" method="POST">
      <div>
        <label class="field-label" for="cfName" id="lblName">Vārds</label>
        <input type="text" id="cfName" name="name" autocomplete="name" placeholder="Jūsu vārds">
      </div>
      <div>
        <label class="field-label" for="cfEmail" id="lblEmail">E-pasts <span class="req">*</span></label>
        <input type="email" id="cfEmail" name="email" autocomplete="email" required placeholder="jusu@epasts.lv">
      </div>
      <div>
        <label class="field-label" for="cfMsg" id="lblMsg">Ziņojums <span class="req">*</span></label>
        <textarea id="cfMsg" name="message" required placeholder="Jūsu ziņojums…"></textarea>
      </div>

      <!-- Pretmēstuļu slazds (netiek rādīts cilvēkiem) -->
      <input class="honey" type="checkbox" name="botcheck" tabindex="-1" autocomplete="off">

      <div class="form-msg" id="formMsg" role="status" aria-live="polite"></div>

      <button type="submit" class="submit-btn" id="submitBtn">Nosūtīt</button>
    </form>

    <a class="back-link" href="/" id="backLink">← Atpakaļ uz kalkulatoru</a>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="footer-links">
      <a href="/" id="footHome">Sākums</a> ·
      <a href="instrukcijas" id="footInstrukcijas">Instrukcijas</a> ·
      <a href="privatuma-politika" id="footPrivacy">Privātuma politika</a> ·
      <a href="kontakti" id="footContact">Kontakti</a>
    </div>
    <div id="footDisclaimer">© 2026 pvnkalkulators.eu</div>
  </div>
</footer>

<script>
(function () {
  // Formas ziņojumi iet caur Web3Forms (bezmaksas serviss) — piekļuves atslēga ir
  // publiska pēc dizaina (Web3Forms to tā arī apraksta), e-pasts pats nekad
  // nav redzams lapas kodā, jo ir piesaistīts atslēgai viņu panelī.
  var WEB3FORMS_ACCESS_KEY = '1b3a3020-3223-46bb-9923-6e935b1da2f5';

  var I18N = {
    lv: {
      htmlLang: 'lv', pageTitle: 'Kontakti | PVN Kalkulators',
      navInstrukcijas: 'Instrukcijas', navBuj: 'BUJ', navLikmes: 'Likmes', navKontakti: 'Kontakti',
      title: 'Sazinies ar mums',
      text: 'Jautājums, ideja vai sadarbības piedāvājums? Uzraksti — atbildēsim tuvāko dienu laikā.',
      lblName: 'Vārds', phName: 'Jūsu vārds',
      lblEmail: 'E-pasts', phEmail: 'jusu@epasts.lv',
      lblMsg: 'Ziņojums', phMsg: 'Jūsu ziņojums…',
      send: 'Nosūtīt', sending: 'Sūta…',
      ok: 'Paldies! Ziņojums nosūtīts. Atbildēsim pēc iespējas ātrāk.',
      errFields: 'Lūdzu, ievadiet e-pastu un ziņojumu.',
      errEmail: 'Lūdzu, ievadiet derīgu e-pasta adresi.',
      errSend: 'Neizdevās nosūtīt. Mēģiniet vēlāk vai rakstiet tieši uz e-pastu.',
      altMail: 'Vai raksti tieši:', back: '← Atpakaļ uz kalkulatoru',
      footHome: 'Sākums', footInstrukcijas: 'Instrukcijas', footPrivacy: 'Privātuma politika', footContact: 'Kontakti',
      footDisclaimer: '© 2026 pvnkalkulators.eu',
      themeTitle: 'Mainīt gaišo/tumšo režīmu', subject: 'Jauns ziņojums no PVN kalkulatora'
    },
    ru: {
      htmlLang: 'ru', pageTitle: 'Контакты | Калькулятор НДС',
      navInstrukcijas: 'Инструкции', navBuj: 'Вопросы', navLikmes: 'Ставки', navKontakti: 'Контакты',
      title: 'Свяжитесь с нами',
      text: 'Вопрос, идея или предложение о сотрудничестве? Напишите нам — ответим в ближайшие дни.',
      lblName: 'Имя', phName: 'Ваше имя',
      lblEmail: 'E-mail', phEmail: 'vash@email.com',
      lblMsg: 'Сообщение', phMsg: 'Ваше сообщение…',
      send: 'Отправить', sending: 'Отправка…',
      ok: 'Спасибо! Сообщение отправлено. Ответим как можно скорее.',
      errFields: 'Пожалуйста, введите e-mail и сообщение.',
      errEmail: 'Пожалуйста, введите корректный e-mail.',
      errSend: 'Не удалось отправить. Попробуйте позже или напишите на e-mail напрямую.',
      altMail: 'Или напишите напрямую:', back: '← Назад к калькулятору',
      footHome: 'Главная', footInstrukcijas: 'Инструкции', footPrivacy: 'Политика конфиденциальности', footContact: 'Контакты',
      footDisclaimer: '© 2026 pvnkalkulators.eu',
      themeTitle: 'Переключить светлый/тёмный режим', subject: 'Новое сообщение с калькулятора НДС'
    },
    en: {
      htmlLang: 'en', pageTitle: 'Contact | VAT Calculator',
      navInstrukcijas: 'Instructions', navBuj: 'FAQ', navLikmes: 'Rates', navKontakti: 'Contact',
      title: 'Get in touch',
      text: 'A question, an idea or a partnership proposal? Drop us a line \u2014 we\u2019ll reply within a few days.',
      lblName: 'Name', phName: 'Your name',
      lblEmail: 'Email', phEmail: 'you@email.com',
      lblMsg: 'Message', phMsg: 'Your message…',
      send: 'Send', sending: 'Sending…',
      ok: 'Thank you! Your message has been sent. We’ll reply as soon as possible.',
      errFields: 'Please enter your email and a message.',
      errEmail: 'Please enter a valid email address.',
      errSend: 'Could not send. Try again later or email us directly.',
      altMail: 'Or write to us directly:', back: '← Back to the calculator',
      footHome: 'Home', footInstrukcijas: 'Instructions', footPrivacy: 'Privacy policy', footContact: 'Contact',
      footDisclaimer: '© 2026 pvnkalkulators.eu',
      themeTitle: 'Toggle light/dark mode', subject: 'New message from the VAT calculator'
    }
  };

  var langSwitch = document.getElementById('langSwitch');
  var themeBtn = document.getElementById('themeBtn');
  var form = document.getElementById('contactForm');
  var submitBtn = document.getElementById('submitBtn');
  var formMsg = document.getElementById('formMsg');
  var nameEl = document.getElementById('cfName');
  var emailEl = document.getElementById('cfEmail');
  var msgEl = document.getElementById('cfMsg');
  var honeyEl = form.querySelector('[name="botcheck"]');
  var lang = 'lv';
  var lastMsgKey = null; // atceramies rādīto ziņu (ok/errFields/errEmail/errSend), lai varam pārtulkot pēc valodas maiņas

  function T() { return I18N[lang]; }

  function apply(l) {
    var t = I18N[l]; if (!t) return;
    lang = l;
    document.documentElement.lang = t.htmlLang;
    document.title = t.pageTitle;
    document.getElementById('navInstrukcijas').textContent = t.navInstrukcijas;
    document.getElementById('navBuj').textContent = t.navBuj;
    document.getElementById('navLikmes').textContent = t.navLikmes;
    document.getElementById('navKontakti').textContent = t.navKontakti;
    document.getElementById('contactTitle').textContent = t.title;
    document.getElementById('contactText').textContent = t.text;
    document.getElementById('lblName').innerHTML = t.lblName;
    document.getElementById('lblEmail').innerHTML = t.lblEmail + ' <span class="req">*</span>';
    document.getElementById('lblMsg').innerHTML = t.lblMsg + ' <span class="req">*</span>';
    nameEl.placeholder = t.phName;
    emailEl.placeholder = t.phEmail;
    msgEl.placeholder = t.phMsg;
    submitBtn.textContent = t.send;
    document.getElementById('backLink').textContent = t.back;
    document.getElementById('footHome').textContent = t.footHome;
    document.getElementById('footInstrukcijas').textContent = t.footInstrukcijas;
    document.getElementById('footPrivacy').textContent = t.footPrivacy;
    document.getElementById('footContact').textContent = t.footContact;
    document.getElementById('footDisclaimer').textContent = t.footDisclaimer;
    themeBtn.title = t.themeTitle;
    langSwitch.querySelectorAll('button').forEach(function (b) {
      var active = b.dataset.lang === l;
      b.classList.toggle('active', active);
      b.setAttribute('aria-checked', String(active));
    });
    document.getElementById('langCurrent').textContent = l.toUpperCase();
    document.getElementById('langBtn').title = { lv: 'Mainīt valodu', ru: 'Сменить язык', en: 'Change language' }[l];
    try { localStorage.setItem('pvn-lang', l); } catch (e) {}
    if (lastMsgKey) formMsg.textContent = t[lastMsgKey];
  }

  function initialLang() {
    try { var s = localStorage.getItem('pvn-lang'); if (s && I18N[s]) return s; } catch (e) {}
    return 'lv';
  }

  langSwitch.querySelectorAll('button').forEach(function (b) {
    b.addEventListener('click', function () { apply(b.dataset.lang); closeLang(); });
  });

  /* --- Valodu nolaižamā saraksta pārslēgšana --- */
  var langDropdown = document.getElementById('langDropdown');
  var langBtn = document.getElementById('langBtn');
  function closeLang() {
    langDropdown.classList.remove('open');
    langBtn.setAttribute('aria-expanded', 'false');
  }
  langBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    var open = langDropdown.classList.toggle('open');
    langBtn.setAttribute('aria-expanded', String(open));
  });
  document.addEventListener('click', function (e) {
    if (!langDropdown.contains(e.target)) closeLang();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeLang();
  });
  apply(initialLang());

  var menuDropdown = document.getElementById('menuDropdown');
  var menuBtn = document.getElementById('menuBtn');
  function closeMenu() {
    menuDropdown.classList.remove('open');
    menuBtn.setAttribute('aria-expanded', 'false');
  }
  menuBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    var open = menuDropdown.classList.toggle('open');
    menuBtn.setAttribute('aria-expanded', String(open));
  });
  document.addEventListener('click', function (e) {
    if (!menuDropdown.contains(e.target)) closeMenu();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeMenu();
  });
  document.getElementById('menuList').querySelectorAll('a').forEach(function (a) {
    a.addEventListener('click', closeMenu);
  });

  // --- Formas nosūtīšana caur Web3Forms (fetch/JSON, bez lapas pārlādes) ---
  function showMsg(kind, key) {
    lastMsgKey = key;
    formMsg.className = 'form-msg show ' + kind;
    formMsg.textContent = T()[key];
  }
  function validEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var t = T();
    if (honeyEl.checked) return; // mēstule
    if (!emailEl.value.trim() || !msgEl.value.trim()) { showMsg('err', 'errFields'); return; }
    if (!validEmail(emailEl.value.trim())) { showMsg('err', 'errEmail'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = t.sending;

    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        access_key: WEB3FORMS_ACCESS_KEY,
        name: nameEl.value.trim(),
        email: emailEl.value.trim(),
        message: msgEl.value.trim(),
        subject: t.subject
      })
    }).then(function (r) { return r.json(); }).then(function (data) {
      submitBtn.disabled = false;
      submitBtn.textContent = t.send;
      if (data.success) {
        showMsg('ok', 'ok');
        form.reset();
      } else {
        showMsg('err', 'errSend');
      }
    }).catch(function () {
      submitBtn.disabled = false;
      submitBtn.textContent = t.send;
      showMsg('err', 'errSend');
    });
  });

  // Tēma — tās pašas SVG ikonas kā index
  var sunIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
    '<circle cx="12" cy="12" r="5"></circle>' +
    '<line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>' +
    '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>' +
    '<line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>' +
    '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>' +
    '</svg>';
  var moonIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>' +
    '</svg>';
  function applyTheme(th) {
    document.documentElement.setAttribute('data-theme', th);
    themeBtn.innerHTML = th === 'dark' ? sunIcon : moonIcon;
    try { localStorage.setItem('pvn-theme', th); } catch (e) {}
  }
  var savedTheme = null;
  try { savedTheme = localStorage.getItem('pvn-theme'); } catch (e) {}
  applyTheme(savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
  themeBtn.addEventListener('click', function () {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  var sepBtn = document.getElementById('sepBtn');
  function applySep(sep) {
    sepBtn.textContent = sep === 'comma' ? ',' : '.';
    try { localStorage.setItem('pvn-decimal-sep', sep); } catch (e) {}
  }
  var savedSep = null;
  try { savedSep = localStorage.getItem('pvn-decimal-sep'); } catch (e) {}
  applySep(savedSep === 'period' ? 'period' : 'comma');
  sepBtn.addEventListener('click', function () {
    applySep(sepBtn.textContent === ',' ? 'period' : 'comma');
  });
})();
</script>
